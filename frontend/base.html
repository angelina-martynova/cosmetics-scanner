<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Skipley{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/mobile.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <!-- ═══ TOP BAR ═══ -->
    <header class="topbar">
      <button class="topbar-brand" onclick="window.location.href = '/'">
        <span data-i18n="brand">Skipley</span>
      </button>

      <div
        class="topbar-actions"
        style="margin-left: auto; display: flex; align-items: center; gap: 8px"
      >
        <!-- Бургер (для авторизованных) -->
        <button
          class="topbar-menu"
          id="menuOpenBtn"
          aria-label="Меню"
          style="display: none"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <!-- Блок для неавторизованных: язык, тема, войти -->
        <div
          id="topbarGuestActions"
          style="display: flex; align-items: center; gap: 8px"
        >
          <button class="btn-icon" id="langToggleTop" title="Змінити мову">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path
                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
              />
            </svg>
          </button>
          <button class="btn-icon" id="themeToggleTop" title="Змінити тему">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              id="themeIconTop"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <a
            href="/login"
            class="btn btn-primary btn-sm"
            style="text-decoration: none"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span data-i18n="topbarLogin">Увійти</span>
          </a>
        </div>
      </div>
    </header>

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-brand" data-i18n="menu">Меню</span>
        <button class="sidebar-close" id="sidebarClose" aria-label="Закрити">
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <a
          href="/"
          class="sidebar-item {% if request.endpoint == 'home' or request.endpoint == 'index' %}active{% endif %}"
        >
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span data-i18n="home">Головна</span>
        </a>
        <a
          href="/scans"
          class="sidebar-item {% if request.endpoint == 'scans_page' %}active{% endif %}"
          id="sidebarScansLink"
          style="display: none"
        >
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          <span data-i18n="scans">Сканування</span>
        </a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-bottom">
        <!-- Language -->
        <button class="sidebar-item" id="langToggle">
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path
              d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
            />
          </svg>
          <span style="flex: 1" data-i18n="lang">Мова</span>
          <span class="sidebar-badge" id="langBadge">УК</span>
        </button>

        <!-- Theme -->
        <button class="sidebar-item" id="themeToggle">
          <svg
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            id="themeIcon"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <span style="flex: 1" data-i18n="theme">Тема</span>
          <span class="sidebar-hint" id="themeHint">Dark</span>
        </button>

        <div class="sidebar-divider"></div>

        <!-- Auth: Login / Logout -->
        <div id="sidebarAuthLoggedOut">
          <a href="/login" class="sidebar-item login-item">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span data-i18n="login">Увійти</span>
          </a>
        </div>
        <div id="sidebarAuthLoggedIn" style="display: none">
          <button class="sidebar-item logout-item" id="logoutBtn">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            <span data-i18n="logout">Вийти</span>
          </button>
        </div>
      </div>
    </aside>
    <div class="sidebar-backdrop hidden" id="sidebarBackdrop"></div>

    <!-- ═══ MAIN ═══ -->
    {% block content %}{% endblock %}

      // ── Глобальная функция перевода ★
      window.i18n = function (key, ...args) {
        const lang = getCurrentLang();
        const val = (I18N[lang] && I18N[lang][key]) || key;
        return typeof val === "function" ? val(...args) : val;
      };

      // ── Применение языка ★
      function applyLanguage(lang) {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (I18N[lang] && I18N[lang][key]) {
            el.textContent = I18N[lang][key];
          }
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          const key = el.getAttribute("data-i18n-placeholder");
          if (I18N[lang] && I18N[lang][key]) {
            el.placeholder = I18N[lang][key];
          }
        });
        // Обновляем aria-label для кнопок переключения пароля
        const showPasswordLabel = I18N[lang]?.showPassword || "Show password";
        document.querySelectorAll(".password-toggle").forEach((btn) => {
          btn.setAttribute("aria-label", showPasswordLabel);
        });
        const badge = document.getElementById("langBadge");
        if (badge) badge.textContent = lang === "uk" ? "УК" : "EN";
        document.documentElement.lang = lang;
        localStorage.setItem("skipley-lang", lang);
      }

      function getCurrentLang() {
        return localStorage.getItem("skipley-lang") || "uk";
      }

      function toggleLanguage() {
        const newLang = getCurrentLang() === "uk" ? "en" : "uk";
        applyLanguage(newLang);
        window.dispatchEvent(
          new CustomEvent("languageChanged", { detail: { lang: newLang } }),
        );
      }

      // ── Sidebar toggle ──
      document
        .getElementById("menuOpenBtn")
        .addEventListener("click", function () {
          document.getElementById("sidebar").classList.add("open");
          document.getElementById("sidebarBackdrop").classList.remove("hidden");
        });
      function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebarBackdrop").classList.add("hidden");
      }
      document
        .getElementById("sidebarClose")
        .addEventListener("click", closeSidebar);
      document
        .getElementById("sidebarBackdrop")
        .addEventListener("click", closeSidebar);

      // ── Theme toggle ──
      (function () {
        var saved = localStorage.getItem("skipley-theme");
        if (saved === "dark") document.body.setAttribute("data-theme", "dark");
        updateThemeUI();
      })();

      document
        .getElementById("themeToggle")
        .addEventListener("click", function () {
          var isDark = document.body.getAttribute("data-theme") === "dark";
          if (isDark) {
            document.body.removeAttribute("data-theme");
            localStorage.setItem("skipley-theme", "light");
          } else {
            document.body.setAttribute("data-theme", "dark");
            localStorage.setItem("skipley-theme", "dark");
          }
          updateThemeUI();
        });

      function updateThemeUI() {
        var isDark = document.body.getAttribute("data-theme") === "dark";
        document.getElementById("themeHint").textContent = isDark
          ? "Light"
          : "Dark";
        document.getElementById("themeIcon").innerHTML = isDark
          ? '<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>'
          : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      }

      // ── Auth state in sidebar ──
      function updateSidebarAuth() {
        fetch("/api/status")
          .then(function (r) {
            return r.ok ? r.json() : Promise.reject();
          })
          .then(function (data) {
            if (data.status === "authenticated") {
              document.getElementById("sidebarAuthLoggedOut").style.display =
                "none";
              document.getElementById("sidebarAuthLoggedIn").style.display =
                "block";
              document.getElementById("sidebarScansLink").style.display =
                "flex";
            }
          })
          .catch(function () {
            document.getElementById("sidebarAuthLoggedOut").style.display =
              "block";
            document.getElementById("sidebarAuthLoggedIn").style.display =
              "none";
            document.getElementById("sidebarScansLink").style.display = "none";
          });
      }
      updateSidebarAuth();

      // ── Topbar state ──
      function updateTopbarAuth() {
        fetch("/api/status")
          .then(function (r) {
            return r.ok ? r.json() : Promise.reject();
          })
          .then(function (data) {
            var isAuth = data.status === "authenticated";
            document.getElementById("menuOpenBtn").style.display = isAuth
              ? "flex"
              : "none";
            document.getElementById("topbarGuestActions").style.display = isAuth
              ? "none"
              : "flex";
          })
          .catch(function () {
            document.getElementById("menuOpenBtn").style.display = "none";
            document.getElementById("topbarGuestActions").style.display =
              "flex";
          });
      }
      updateTopbarAuth();

      // Продублируем обработчики темы и языка для верхнего бара
      document
        .getElementById("themeToggleTop")
        .addEventListener("click", function () {
          var isDark = document.body.getAttribute("data-theme") === "dark";
          if (isDark) {
            document.body.removeAttribute("data-theme");
            localStorage.setItem("skipley-theme", "light");
          } else {
            document.body.setAttribute("data-theme", "dark");
            localStorage.setItem("skipley-theme", "dark");
          }
          updateThemeUI();
          updateThemeTopUI();
        });
      function updateThemeTopUI() {
        var isDark = document.body.getAttribute("data-theme") === "dark";
        var icon = document.getElementById("themeIconTop");
        if (icon) {
          icon.innerHTML = isDark
            ? '<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>'
            : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        }
      }
      updateThemeTopUI();

      // ★ Обработчики языка
      document
        .getElementById("langToggleTop")
        .addEventListener("click", toggleLanguage);
      document
        .getElementById("langToggle")
        .addEventListener("click", toggleLanguage);

      // ★ Делаем функцию определения языка глобальной
      window.getCurrentLang = getCurrentLang;

      // ★ Применяем язык после полной загрузки DOM (включая модальные окна)
      document.addEventListener("DOMContentLoaded", function () {
        applyLanguage(getCurrentLang());
      });
    </script>

    {% block scripts %}{% endblock %}
  </body>
</html>
